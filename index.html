<!DOCTYPE html>
<html>
<head>
  <title>DJ </title>
  <style>
/* Base style */
.rate-box {
box-shadow: 0 0 10px rgba(90, 15, 15, 0.5);
  flex: 1;
  padding: 15px;
  text-align: center;
  border-radius: 15px;
  animation: blinkRate 3s infinite;
}

/* Text border effect */
.rate-box h3,
.rate-box p {
  -webkit-text-stroke: 0.3px black;
}

/* Animation */
@keyframes blinkRate {
  0% {
    background-color: #5a0f0f;
    color: white;
  }
  
  50% {
    background-color: white;
    color: #5a0f0f;
  }
  
  100% {
    background-color: #5a0f0f;
    color: white;
  }
}
.slideshow {
  flex: 3;
  overflow: hidden;
}

.slider-track {
  display: flex;
  width: max-content;
  animation: scroll 20s linear infinite;
}

.slider-track img {
  width: 300px;
  height: auto;
  object-fit: cover;
}

/* Continuous scrolling */
@keyframes scroll {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(-50%);
  }
}
    body {
      margin: 0;
      font-family: Arial;
      background:antiquewhite;
      color: white;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #111;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: gold;
    }

    .menu, .cart {
      font-size: 20px;
      cursor: pointer;
    }

    /* MAIN SECTION */
    .main {
      display: block;
      padding: 20px;
      gap: 20px;
    }

  .slideshow {
  width="100";
  height: 250px;
  background: #222;
  border:10px gold;
border-radius: 20px;
border animation:move;
  overflow: hidden;
}

    .rate-box {
transition: all 0.5s ease;
      flex: 1;
      background: #1a1a1a;
      padding: 10px;
      text-align:centre;
      margin-top: 20px;
      border: 1px solid gold;
    }

    /* BUTTON */
    .more {
      text-align: center;
      margin: 10px;
    }

    .more button {
      padding: 10px 20px;
      background: pink;
      border: black;
      cursor: pointer;
    }
/* Wrapper for animated border */
.slideshow-border {
  position: relative;
  display: inline-block;
}

/* Golden animated border */
.slideshow-border::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 2px; /* thickness of border */
  border-radius: 10px;

  background: linear-gradient(90deg, gold, orange, gold);
  background-size: 300% 300%;

  animation: borderMove 4s linear infinite;

  -webkit-mask: 
    linear-gradient(#000 0 0) content-box, 
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

/* Animation */
@keyframes borderMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="menu">☰</div>
    <div class="logo">
<div class="logo">
  <img src="logo1.jpg" height="80">
</div>
    </div>
    <div class="cart">🛒</div>
  </div>

  <!-- MAIN -->
  <div class="main">
    
    <!-- SLIDESHOW -->
<div class="slideshow">
  <div class="slider-track">
    <img src="ring1.jpg">
    <img src="ring2.jpg">
    <img src="ring3.jpg">
    
    <!-- duplicate for smooth loop -->
    <img src="ring1.jpg">
    <img src="ring2.jpg">
    <img src="ring3.jpg">
  </div>
</div>
<div class="rate-box">
  <h3>Gold Rate Per Gram</h3>
  <p>22KT: ₹13,835/-</p>
  <p>18KT: ₹12,376</p>
</div>
  <!-- MORE BUTTON -->
  <div class="more">
    <button>View More Designs</button>
  </div>
<script>
  window.onload = function() {
    let images = ["ring1.jpg", "ring2.jpg"];
    let i = 0;
    
    setInterval(function() {
      i = (i + 1) % images.length;
      document.getElementById("slide").src = images[i];
    }, 2000);
  };
</script>
</body>
</html>
