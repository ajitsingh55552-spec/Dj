<!DOCTYPE html>
<html>
<head>
  <title>DJ </title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #111;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: gold;
    }

    .menu, .cart {
      font-size: 20px;
      cursor: pointer;
    }

    /* MAIN SECTION */
    .main {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

  .slideshow {
  flex: 3;
  height: 250px;
  background: #222;
  overflow: hidden;
}

    .rate-box {
      flex: 1;
      background: #1a1a1a;
      padding: 15px;
      text-align: center;
      border: 1px solid gold;
    }

    /* BUTTON */
    .more {
      text-align: center;
      margin: 20px;
    }

    .more button {
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="menu">☰</div>
    <div class="logo">
  <img src="IMG_2387.png" height="40"></div> 
<div class="cart">🛒</div>
  </div>
  
  <!-- MAIN -->
  <div class="main">
    
    <!-- SLIDESHOW -->
<div class="slideshow">
  <img id="slide" src="ring1.jpg" "ring2.jpg" style="width:100%; height:100%; object-fit: cover;">
</div>
    <!-- LIVE RATE -->
    <div class="rate-box">
      <h3>Gold Rate Per Gram</h3>
      <p>22KT: ₹13,835/-</p>
      <p>18KT: ₹12,376/-</p>
    </div>

  </div>

  <!-- MORE BUTTON -->
  <div class="more">
    <button>View More Designs</button>
  </div>
<script>
  window.onload = function() {
    let images = ["ring1.jpg", "ring2.jpg"];
    let i = 0;
    
    setInterval(function() {
      i = (i + 1) % images.length;
      document.getElementById("slide").src = images[i];
    }, 2000);
  };
<script>
window.addEventListener("load", function () {
  let images = ["ring1.jpg", "ring2.jpg", "ring3.jpg"];
  let i = 0;

  setInterval(function () {
    i = (i + 1) % images.length;
    document.getElementById("slide").src = images[i];
  }, 2000);
});
</script>
</body>
</html>
